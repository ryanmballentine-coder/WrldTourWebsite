<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <img src="images/logo.png" class="logo">
</header>

<div class="container form-container">

<h2>Edit Profile</h2>

<div class="form-group">
<label>Name</label>
<input placeholder="Your name">
</div>

<div class="form-group">
<label>Bio</label>
<input placeholder="Tell people about yourself">
</div>

<div class="form-group">
<label>Location</label>
<input placeholder="Where are you now">
</div>

<div class="form-group">
<label>Interests</label>
<input placeholder="Travel, food, nightlife...">
</div>

<div class="form-group">
<label>Upload Profile Picture</label>
<input type="file">
</div>

<div class="form-group">
<label>Preferred Travel Style</label>
<select>
<option>Luxury</option>
<option>Budget</option>
<option>Backpacking</option>
</select>
</div>

<div class="form-group">
<label>Availability</label>
<input placeholder="When are you traveling?">
</div>

<button style="width:100%; margin-top:10px;">Save Changes</button>

</div>

</body>
</html>
